<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УКД Тести</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px; text-align: center;
        }
        .btn {
            background: linear-gradient(135deg, #6366f1, #a855f7); border: none; color: white;
            padding: 15px; border-radius: 12px; width: 100%; margin-top: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .progress-bar {
            width: 100%; height: 8px; background: #1e293b; border-radius: 4px; margin-bottom: 20px; overflow: hidden;
        }
        .progress { width: 0%; height: 100%; background: #22d3ee; transition: 0.3s; }
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="card">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="quiz-container">
            <h2>⏳ Завантаження тесту...</h2>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Беремо дані, які нам передав Node.js через посилання
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');

        let questions = [];
        let currentQ = 0;
        let score = 0;

        if (dataParam) {
            try {
                questions = JSON.parse(decodeURIComponent(dataParam));
            } catch(e) {
                document.getElementById('quiz-container').innerHTML = "Помилка читання даних";
            }
        } else {
            document.getElementById('quiz-container').innerHTML = "Тест не знайдено :(";
        }

        function renderQuestion() {
            if(currentQ >= questions.length) {
                document.getElementById('quiz-container').innerHTML = `<h2>Тест завершено! 🎉</h2><p>Твій результат: ${score} з ${questions.length}</p><button class='btn' onclick='tg.close()'>Закрити</button>`;
                return;
            }
            
            const q = questions[currentQ];
            let html = `<h2>${q.q}</h2>`;
            q.options.forEach((opt, idx) => {
                html += `<button class='btn' onclick='answer(${idx}, ${q.correctIndex})'>${opt}</button>`;
            });
            
            document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
            document.getElementById('quiz-container').innerHTML = html;
        }

        function answer(selected, correct) {
            if(selected === correct) {
                score++;
                tg.HapticFeedback.notificationOccurred('success'); // Вібрація телефону при правильній відповіді
            } else {
                tg.HapticFeedback.notificationOccurred('error'); // Вібрація при помилці
            }
            currentQ++;
            renderQuestion();
        }

        if(questions.length > 0) renderQuestion();
    </script>
</body>
</html>
