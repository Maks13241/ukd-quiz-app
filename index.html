<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .progress {
            width: 30%;
            height: 100%;
            background: #22d3ee;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress"></div></div>
    <div class="card">
        <h2 id="question">Як працює Primary Key у PostgreSQL?</h2>
        <button class="btn" onclick="next()">Відповідь А</button>
        <button class="btn" onclick="next()">Відповідь Б</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортає вікно на весь екран
    </script>
</body>
</html>
