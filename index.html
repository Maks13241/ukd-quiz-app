// ... (стилі залишаються ті самі)
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const urlParams = new URLSearchParams(window.location.search);
    const dataParam = urlParams.get('data');

    let questions = [];
    let currentQ = 0;
    let score = 0;

    if (dataParam) {
        try {
            questions = JSON.parse(decodeURIComponent(dataParam));
        } catch(e) {
            document.getElementById('quiz-container').innerHTML = "Помилка завантаження";
        }
    }

    function renderQuestion() {
        if(currentQ >= questions.length) {
            document.getElementById('quiz-container').innerHTML = `<h2>Фініш! 🎉</h2><p>Результат: ${score}/${questions.length}</p><button class='btn' onclick='tg.close()'>Закрити</button>`;
            return;
        }
        
        const q = questions[currentQ];
        // Використовуємо нові ключі q, a, c
        let html = `<h2>${q.q}</h2>`;
        q.a.forEach((opt, idx) => {
            html += `<button class='btn' onclick='answer(${idx}, ${q.c})'>${opt}</button>`;
        });
        
        document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
        document.getElementById('quiz-container').innerHTML = html;
    }

    function answer(selected, correct) {
        if(selected === correct) {
            score++;
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            tg.HapticFeedback.notificationOccurred('error');
        }
        currentQ++;
        renderQuestion();
    }

    if(questions.length > 0) renderQuestion();
</script>
